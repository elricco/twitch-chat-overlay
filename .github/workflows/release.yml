name: Release

on:
  push:
    branches: [main]
    paths: [README.md]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      is_new: ${{ steps.check.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from README
        id: version
        run: |
          VERSION=$(grep -m1 '^## v' README.md | sed 's/^## //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: |
            overlay.html
            chat.js
            settings.html
            README.md
            LICENSE.md

  deploy:
    needs: release
    if: needs.release.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy files
        run: |
          mkdir -p _site
          cp overlay.html chat.js settings.html README.md LICENSE.md _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
