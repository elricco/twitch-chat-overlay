<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Chat Overlay</title>
  <style>
    /* ── CSS Variables (overridden by chat.js) ── */
    :root {
      --corner-radius: 8px;
      --font-size: 15px;
      --font-family: 'Inter', sans-serif;
      --bg-color: #00000080;
      --text-color: #ffffff;
      --avatar-size: 36px;
      --msg-gap: 6px;
      --overlay-width: 400px;
      --offset-x: 0px;
      --offset-y: 0px;
      /* Per-element typography */
      --name-font-family: var(--font-family);
      --name-font-size: 13.5px;
      --name-font-weight: 700;
      --name-font-style: normal;
      --msg-font-family: var(--font-family);
      --msg-font-size: var(--font-size);
      --msg-font-weight: 400;
      --msg-font-style: normal;
      --bubble-fit: 0; /* 0 = full width, 1 = fit-content */
      /* Split Bubble */
      --name-bubble-bg: #9b5de580;
      --name-bubble-radius: 8px;
      --name-bubble-offset-x: 0px;
      --name-bubble-offset-y: 0px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    /* ── Outer wrapper: positions the chat column ── */
    #chat-wrapper {
      position: fixed;
      bottom: var(--offset-y);
      left: var(--offset-x);
      width: var(--overlay-width);
      max-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none;
      padding: 8px;
    }

    /* ── Chat container ── */
    #chat-container {
      display: flex;
      flex-direction: column;
      gap: var(--msg-gap);
      width: 100%;
    }

    /* ── Individual message ── */
    .chat-message {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: var(--bg-color);
      border-radius: var(--corner-radius);
      padding: 6px 10px;
      font-family: var(--font-family);
      font-size: var(--font-size);
      color: var(--text-color);
      line-height: 1.4;
      word-break: break-word;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      /* Default: invisible for animation */
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #chat-container.bubble-fit .chat-message {
      width: fit-content;
      max-width: 100%;
    }

    #chat-container.bubble-fit.alternating .chat-message:nth-child(even) {
      margin-left: auto;
    }

    /* ── Animations ── */

    /* slide (default) */
    #chat-container[data-animation="slide"] .chat-message {
      transform: translateX(-28px);
    }
    #chat-container[data-animation="slide"] .chat-message.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* slide-right */
    #chat-container[data-animation="slide-right"] .chat-message {
      transform: translateX(28px);
    }
    #chat-container[data-animation="slide-right"] .chat-message.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* fade */
    #chat-container[data-animation="fade"] .chat-message {
      transform: none;
    }
    #chat-container[data-animation="fade"] .chat-message.visible {
      opacity: 1;
    }

    /* pop */
    #chat-container[data-animation="pop"] .chat-message {
      transform: scale(0.75);
      transform-origin: left center;
    }
    #chat-container[data-animation="pop"] .chat-message.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* none */
    #chat-container[data-animation="none"] .chat-message {
      opacity: 1;
      transform: none;
    }

    /* removing */
    .chat-message.removing {
      opacity: 0 !important;
      transform: scale(0.95) !important;
      pointer-events: none;
    }

    /* ── Avatar ── */
    .avatar {
      width: var(--avatar-size);
      height: var(--avatar-size);
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      margin-top: 2px;
      background: #2a2a2a;
    }

    /* ── Message body ── */
    .message-body {
      flex: 1;
      min-width: 0;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 2px;
    }

    /* ── Badges ── */
    .badges {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .badge {
      width: 18px;
      height: 18px;
      object-fit: contain;
      vertical-align: middle;
    }

    /* ── Username ── */
    .username {
      font-family: var(--name-font-family);
      font-size: var(--name-font-size);
      font-weight: var(--name-font-weight);
      font-style: var(--name-font-style);
      letter-spacing: 0.01em;
    }

    /* ── Message text ── */
    .message-text {
      font-family: var(--msg-font-family);
      font-size: var(--msg-font-size);
      font-weight: var(--msg-font-weight);
      font-style: var(--msg-font-style);
      line-height: 1.5;
    }

    /* ── Emotes ── */
    .emote {
      height: calc(var(--font-size) * 2);
      width: auto;
      vertical-align: middle;
      display: inline-block;
      margin: 0 1px;
    }

    /* ── Error notice ── */
    #error-notice {
      display: none;
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(220, 50, 50, 0.9);
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 13px;
      max-width: 90%;
      text-align: center;
      z-index: 999;
    }

    /* ── Split Bubble Layout ── */
    .chat-message.split {
      background: transparent !important;
      padding: 0;
      gap: 0;
    }

    .split-group {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .name-bubble {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--name-bubble-bg);
      border-radius: var(--name-bubble-radius);
      padding: 5px 10px;
      margin-left: var(--name-bubble-offset-x);
      margin-bottom: var(--name-bubble-offset-y);
      position: relative;
      z-index: 1;
      max-width: 100%;
    }

    .name-bubble .avatar {
      width: calc(var(--avatar-size) * 0.75);
      height: calc(var(--avatar-size) * 0.75);
      margin-top: 0;
    }

    .chat-message.split .message-body {
      background: var(--bg-color);
      border-radius: var(--corner-radius);
      padding: 6px 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .chat-message.split .message-body .message-header {
      display: none;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <div id="chat-wrapper">
    <div id="chat-container" data-animation="slide"></div>
  </div>
  <div id="error-notice"></div>
  <script src="chat.js"></script>
</body>
</html>
